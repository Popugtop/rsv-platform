server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Mime types (обязательно для корректной отдачи JS/CSS)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # SPA fallback — все маршруты идут в index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статики на год
    location ~* \.(js|css|svg|ico|woff|woff2|ttf|eot|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Gzip отключён — Caddy сам сжимает
    gzip off;
}
